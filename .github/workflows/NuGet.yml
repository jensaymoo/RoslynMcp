name: Publish NuGet tool

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]


jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.x
        
    - name: Restore dependencies
      run: dotnet restore
      
    - name: Run Tests
      run: dotnet test --verbosity normal
      
